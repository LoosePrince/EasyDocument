name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # build.py 需完整 Git 历史以生成 path.json 中的 git 信息
          ref: ${{ github.event.client_payload.ref || github.ref }}

      - name: 检测变更路径
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            build:
              - 'data/main/**'
              - 'config.js'
            static_site:
              - '**'
              - '!data/**'
              - '!README.md'
              - '!**/*.json'

      - name: 设置Python环境
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.build == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: 安装依赖
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.build == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行build.py脚本
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.build == 'true'
        run: |
          python build.py --merge

      - name: 设置Pages
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.build == 'true' || steps.filter.outputs.static_site == 'true'
        uses: actions/configure-pages@v5

      - name: 上传构建结果
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.build == 'true' || steps.filter.outputs.static_site == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 部署到GitHub Pages
        id: deployment
        if: github.event_name == 'workflow_dispatch' || steps.filter.outputs.build == 'true' || steps.filter.outputs.static_site == 'true'
        uses: actions/deploy-pages@v4
